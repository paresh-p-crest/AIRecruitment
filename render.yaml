services:
  - type: web
    name: slicehrms-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////tmp/recruitment.db
      - key: USE_TEXTRACT
        value: "true"
